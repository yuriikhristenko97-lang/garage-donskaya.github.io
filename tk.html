<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚛 ТК — Грузовой паркинг</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            background:
                radial-gradient(ellipse at top, rgba(147,112,219,0.15) 0%, transparent 70%),
                radial-gradient(ellipse at bottom, rgba(107,76,122,0.2) 0%, transparent 70%),
                linear-gradient(135deg, #4a2f5e 0%, #3a254e 50%, #2a1a3a 100%);
            color:#eee;
            font-family:'Segoe UI',Arial,sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow:hidden;
        }
        .garage{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            background:linear-gradient(180deg, #2a1a3a 0%, #1a0f2a 100%);
            border:2px solid #9370db;
            padding:16px;
            border-radius:14px;
            box-shadow:0 10px 40px rgba(147,112,219,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
            max-width:98vw;
            max-height:98vh;
            overflow:auto;
        }
        
        /* === ЛЕВАЯ ПАНЕЛЬ С ВЪЕЗДАМИ === */
        .left-panel{
            display:flex;
            flex-direction:column;
            justify-content: space-between;
            height: 100%;
            gap:10px;
            padding:10px;
            background:linear-gradient(180deg, #4a2f5e 0%, #2a1a3a 100%);
            border-radius:10px;
            border:2px solid #9370db;
            margin-right:15px;
            flex-shrink:0;
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
            position:relative;
        }
        
        /* 🚛 ГРУЗОВИК НА ВЪЕЗДЕ (новый элемент) */
        .truck-entrance{
            position:absolute;
            bottom:-55px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:4px;
            z-index:10;
        }
        .truck-entrance .truck-icon{
            font-size:28px;
            animation:truckBounce 2s infinite;
            filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4));
        }
        .truck-entrance .label{
            color:#4ade80;
            font-size:9px;
            font-weight:700;
            letter-spacing:1px;
            text-transform:uppercase;
            text-shadow:0 0 8px rgba(74,222,128,0.6);
            white-space:nowrap;
            background:rgba(26,15,42,0.8);
            padding:2px 6px;
            border-radius:4px;
            border:1px solid #4ade80;
        }
        @keyframes truckBounce{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-4px);}
        }
        
        .gate{
            width:48px;
            height:72px;
            background:linear-gradient(180deg, #6b4c7a 0%, #4a2f5e 100%);
            border:2px solid #9370db;
            border-radius:8px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            cursor:default;
            box-shadow:0 3px 10px rgba(147,112,219,0.3);
            transition:transform 0.2s, box-shadow 0.2s;
        }
        .gate:hover{
            transform:translateX(2px);
            box-shadow:0 5px 15px rgba(147,112,219,0.5);
        }
        .gate .arrow{
            color:#d8c4e8;
            font-size:22px;
            font-weight:bold;
            animation:arrowPulse 2s infinite;
        }
        @keyframes arrowPulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
        
        /* === ОСНОВНАЯ ЗОНА ПАРКОВКИ === */
        .parking-area{
            display:flex;
            flex-direction:column;
            justify-content: space-between;
            gap: 20px;
            flex:1;
            min-width:0;
        }
        
        .row-top{display:flex;align-items:flex-start;justify-content:center;gap:14px;width:100%;}
        .row-bottom{display:flex;align-items:flex-end;justify-content:center;gap:14px;width:100%;}
        
        .window-block{
            display:flex;flex-direction:column;align-items:center;gap:5px;
            animation:fadeIn 0.4s ease backwards;
        }
        .window-block:nth-child(1){animation-delay:0.05s;}
        .window-block:nth-child(2){animation-delay:0.1s;}
        .window-block:nth-child(3){animation-delay:0.15s;}
        .window-block:nth-child(4){animation-delay:0.2s;}
        .window-block:nth-child(5){animation-delay:0.25s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        
        .window{display:flex;gap:3px;}
        .row-top .window-part,
        .row-bottom .window-part {
            width:42px;height:32px;
            background:linear-gradient(180deg, #9370db 0%, #7b5a9e 50%, #6b4c7a 100%) !important;
            border:2px solid #b19cd9 !important;border-radius:5px;position:relative;
            box-shadow:0 2px 6px rgba(147,112,219,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .row-top .window-part::before,
        .row-bottom .window-part::before {
            content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;
            background:rgba(255,255,255,0.25);border-radius:4px;
        }
        .row-top .window-part::after,
        .row-bottom .window-part::after {
            content:'';position:absolute;top:50%;left:8px;right:8px;height:1px;
            background:rgba(255,255,255,0.3);
        }
        
        .triple-spot{
            display:flex;gap:3px;padding:4px;
            background:linear-gradient(180deg, #4a2f5e 0%, #2a1a3a 100%);
            border-radius:8px;border:2px solid #9370db;
            box-shadow:0 3px 10px rgba(147,112,219,0.25);
        }
        .triple-spot .spot{
            width:48px;height:70px;border:2px solid #9370db;
            padding:3px 2px;font-size:8px;
            display:flex;flex-direction:column;cursor:pointer;
            transition:all 0.25s ease;text-align:center;
            background:linear-gradient(180deg, #5a3d6e 0%, #4a2f5e 100%);
            border-radius:6px;position:relative;overflow:hidden;
        }
        .triple-spot .spot::before{
            content:'';position:absolute;top:0;left:0;right:0;bottom:0;
            background:linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events:none;border-radius:6px;
        }
        .triple-spot .spot:hover{
            transform:translateY(-2px) scale(1.04);
            box-shadow:0 6px 16px rgba(147,112,219,0.5);
            border-color:#b19cd9;z-index:100;
            background:linear-gradient(180deg, #6b4c7a 0%, #5a3d6e 100%);
        }
        .triple-spot .spot.empty{
            background:linear-gradient(180deg, #5a3d6e 0%, #4a2f5e 100%);
            border-style:dashed;animation:pulseEmpty 3s infinite;
        }
        @keyframes pulseEmpty{
            0%,100%{box-shadow:0 3px 10px rgba(147,112,219,0.25);}
            50%{box-shadow:0 3px 18px rgba(147,112,219,0.45);}
        }
        .triple-spot .spot.occupied{
            background:linear-gradient(180deg, #059669 0%, #047857 100%);
            border-color:#34d399;box-shadow:0 3px 10px rgba(52,211,153,0.35);
        }
        .triple-spot .spot .num{
            position:absolute;top:2px;left:50%;transform:translateX(-50%);
            font-size:7px;color:#d8c4e8;font-weight:bold;
            background:rgba(0,0,0,0.5);padding:1px 4px;
            border-radius:3px;white-space:nowrap;z-index:2;
        }
        .triple-spot .spot .car-info{
            display:flex;flex-direction:column;justify-content:center;
            align-items:center;height:100%;padding-top:14px;gap:2px;z-index:2;
        }
        .triple-spot .spot .car-mark{
            color:#fde047;font-size:9px;font-weight:700;
            word-break:break-word;max-width:100%;line-height:1.15;
            text-shadow:0 2px 4px rgba(0,0,0,0.8);
            overflow:hidden;text-overflow:ellipsis;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
        }
        .triple-spot .spot .car-num{
            color:#fff;font-size:8px;font-weight:600;
            word-break:break-word;max-width:100%;line-height:1.15;
            background:rgba(0,0,0,0.6);padding:1px 3px;
            border-radius:3px;white-space:nowrap;
            overflow:hidden;text-overflow:ellipsis;
        }
        .triple-spot .spot .empty-icon{
            font-size:20px;color:#b19cd9;margin-top:auto;animation:bounce 2s infinite;
        }
        @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
        
        /* === ПОДСКАЗКА === */
        .tooltip{
            display:none;position:fixed;
            background:linear-gradient(180deg, #2a1a3a 0%, #1a0f2a 100%);
            border:2px solid #b19cd9;border-radius:12px;
            padding:16px 20px;min-width:280px;max-width:360px;
            z-index:1000;flex-direction:column;align-items:flex-start;
            box-shadow:0 15px 50px rgba(147,112,219,0.4);
            pointer-events:none;text-align:left;animation:tooltipIn 0.2s ease;
        }
        @keyframes tooltipIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
        .tooltip .header{
            display:flex;align-items:center;gap:10px;width:100%;
            margin-bottom:8px;padding-bottom:8px;
            border-bottom:1px solid rgba(177,156,217,0.3);
        }
        .tooltip .color-badge{
            width:28px;height:28px;border-radius:50%;
            border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);
            flex-shrink:0;position:relative;
        }
        .tooltip .color-badge.auto-detected::after{
            content:'✨';position:absolute;bottom:-4px;right:-4px;
            font-size:10px;background:#2a1a3a;border-radius:50%;
            width:16px;height:16px;display:flex;align-items:center;
            justify-content:center;border:1px solid #b19cd9;
        }
        .tooltip .mark{
            color:#d8c4e8;font-size:18px;font-weight:700;
            text-shadow:0 2px 6px rgba(0,0,0,0.6);
            word-break:break-word;line-height:1.2;flex:1;min-width:0;
        }
        .tooltip .divider{
            width:100%;height:1px;
            background:linear-gradient(90deg, transparent, #b19cd9, transparent);
            margin:8px 0;
        }
        .tooltip .num{
            color:#fff;font-size:16px;font-weight:600;
            background:rgba(147,112,219,0.25);padding:6px 14px;
            border-radius:6px;letter-spacing:1px;
            text-shadow:0 2px 4px rgba(0,0,0,0.5);
            white-space:nowrap;width:100%;text-align:center;
            box-sizing:border-box;border:1px solid rgba(177,156,217,0.4);
        }
        .tooltip .extra-info{
            margin-top:10px;width:100%;
            display:flex;flex-direction:column;gap:6px;
            color:#e9d5ff;font-size:13px;
        }
        .tooltip .extra-info .row{
            display:flex;justify-content:space-between;
            align-items:center;width:100%;
        }
        .tooltip .extra-info .label{color:#b19cd9;font-size:12px;}
        .tooltip .extra-info .value{
            color:#fff;font-weight:600;text-align:right;
            word-break:break-word;max-width:60%;
        }
        .tooltip .spot-id{
            color:#9370db;font-size:10px;margin-top:10px;
            text-align:center;width:100%;opacity:0.8;
        }
        
        /* === ПОИСК === */
        .spot.spot-found{
            border:2px solid #22c55e !important;
            box-shadow:0 0 0 3px rgba(34,197,94,0.4) !important;
            animation:pulse-found 2s infinite;
        }
        @keyframes pulse-found{
            0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,0.4);}
            50%{box-shadow:0 0 0 5px rgba(34,197,94,0.6);}
        }
        
        /* === ВЕРХНИЙ БАР === */
        .top-bar{
            position:fixed;top:10px;left:10px;
            display:flex;gap:8px;z-index:999;
            align-items:center;flex-wrap:wrap;
        }
        .nav-btn,.edit-mode-btn,.search-input{
            padding:10px 14px;
            background:linear-gradient(180deg, #7b5a9e 0%, #6b4c7a 100%);
            color:#fff;border:none;border-radius:8px;
            cursor:pointer;font-size:13px;font-weight:600;
            box-shadow:0 4px 15px rgba(147,112,219,0.4);
            transition:all 0.25s;display:flex;
            align-items:center;gap:5px;text-decoration:none;
            white-space:nowrap;
        }
        .nav-btn:hover,.edit-mode-btn:hover,.search-input:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(147,112,219,0.55);
        }
        .nav-btn.main-garage{
            background:linear-gradient(180deg, #9370db 0%, #7b5a9e 100%);
            box-shadow:0 4px 15px rgba(147,112,219,0.4);
        }
        .nav-btn.main-garage:hover{
            box-shadow:0 6px 20px rgba(147,112,219,0.55);
        }
        .nav-btn.chatp{
            background:linear-gradient(180deg, #a78bfa 0%, #9370db 100%);
            box-shadow:0 4px 15px rgba(167,139,250,0.4);
        }
        .nav-btn.chatp:hover{
            box-shadow:0 6px 20px rgba(167,139,250,0.55);
        }
        .edit-mode-btn.active{
            background:linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            box-shadow:0 4px 15px rgba(34,197,94,0.4);
            animation:pulse-green 2s infinite;
        }
        @keyframes pulse-green{
            0%,100%{box-shadow:0 4px 15px rgba(34,197,94,0.4);}
            50%{box-shadow:0 4px 22px rgba(34,197,94,0.6);}
        }
        .search-input{
            background:#2a1a3a;color:#e9d5ff;
            border:2px solid #9370db;padding:10px 12px;
            width:190px;font-size:13px;font-weight:normal;
        }
        .search-input::placeholder{color:#b19cd9;}
        .search-input:focus{
            outline:none;border-color:#b19cd9;
            box-shadow:0 0 10px rgba(177,156,217,0.4);
            transform:translateY(0);
        }
        
        /* ========== ЕДИНЫЕ СТИЛИ ДЛЯ МОДАЛЬНЫХ ОКОН ========== */
        .modal-base {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.9);
            align-items:center;
            justify-content:center;
            z-index:1000;
            backdrop-filter:blur(8px);
        }
        .modal-content {
            background:linear-gradient(180deg, #2d2d2d 0%, #252525 100%);
            padding:22px;
            border-radius:14px;
            width:360px;
            max-width:90vw;
            border:1px solid #555;
            box-shadow:0 15px 50px rgba(0,0,0,0.7);
        }
        .modal-content h3 {
            margin-bottom:14px;
            color:#ffd700;
            text-align:center;
            font-size:16px;
            font-weight:600;
        }
        .modal-content input {
            width:100%;
            margin:8px 0;
            padding:11px 12px;
            background:#1a1a1a;
            border:1px solid #555;
            color:#eee;
            border-radius:6px;
            font-size:13px;
        }
        .modal-content input:focus {
            outline:none;
            border-color:#6366f1;
            box-shadow:0 0 10px rgba(99,102,241,0.3);
        }
        .modal-content .btn-group {
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            margin-top:14px;
            gap:6px;
        }
        .modal-content button {
            padding:10px 6px;
            background:#555;
            color:#eee;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:11px;
            transition:all 0.2s;
            font-weight:600;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .modal-content button:hover { transform:translateY(-1px); }
        .modal-content button.clear {
            background:linear-gradient(180deg, #c0392b 0%, #922b21 100%);
        }
        .modal-content button.clear:hover {
            background:linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
        }
        .modal-content button.save {
            background:linear-gradient(180deg, #27ae60 0%, #1e8449 100%);
        }
        .modal-content button.save:hover {
            background:linear-gradient(180deg, #2ecc71 0%, #27ae60 100%);
        }
        .modal-content button.close,
        .modal-content button.cancel {
            background:#555;
        }
        .modal-content button.close:hover,
        .modal-content button.cancel:hover {
            background:#666;
        }
        .modal-content button.confirm {
            background:linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
        }
        .modal-content button.confirm:hover {
            background:linear-gradient(180deg, #818cf8 0%, #6366f1 100%);
        }
        .modal-content .error {
            color:#f87171;
            font-size:12px;
            margin:8px 0;
            text-align:center;
            display:none;
        }
        /* ===================================================== */
        
        .status{
            position:fixed;top:10px;right:10px;
            padding:8px 16px;background:#2d2d2d;
            border:1px solid #444;border-radius:6px;
            font-size:12px;z-index:999;
        }
        .status.connected{border-color:#4ade80;color:#4ade80;}
        .status.disconnected{border-color:#f87171;color:#f87171;}
        
        .garage::before{
            content:'';position:absolute;
            top:-50%;left:-50%;right:-50%;bottom:-50%;
            background:radial-gradient(circle at 30% 20%, rgba(147,112,219,0.08) 0%, transparent 50%),
                       radial-gradient(circle at 70% 80%, rgba(107,76,122,0.1) 0%, transparent 50%);
            pointer-events:none;z-index:-1;
        }
    </style>
</head>
<body>
    <div class="status" id="status">🔄 Подключение...</div>
    
    <div class="top-bar">
        <!-- 📋 ЕДИНЫЙ БЛОК НАВИГАЦИИ -->
        <a href="index.html" class="nav-btn main-garage" title="Вернуться в главное меню">🏠 Меню</a>
        <a href="catp.html" class="nav-btn chatp" title="Перейти в ЧАТП">🚌 ЧАТП</a>
        <div style="width:2px;height:24px;background:#9370db;margin:0 4px;border-radius:1px;"></div>
        <button class="edit-mode-btn" id="editModeBtn" onclick="toggleEditMode()">✏️ Редактирование</button>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск..." oninput="handleSearch()">
    </div>
    
    <main>
        <div class="garage">
            <div style="display:flex;align-items:stretch;">
                <!-- Левая панель с въездами + грузовик -->
                <div class="left-panel">
                    <div class="gate"><span class="arrow">🚛</span></div>
                    <div class="gate"><span class="arrow">🚛</span></div>
                    <div class="gate"><span class="arrow">🚛</span></div>
                    <div class="gate"><span class="arrow">🚛</span></div>
                    
                    <!-- 🚛 Грузовик на въезде -->
                    <div class="truck-entrance">
                        <span class="truck-icon">🚚</span>
                        <span class="label">Въезд</span>
                    </div>
                </div>
                <div class="parking-area" id="g"></div>
            </div>
        </div>
    </main>
    
    <div class="tooltip" id="tooltip"></div>
    
    <!-- 🔐 Модальное окно пароля (единый стиль) -->
    <div id="passwordModal" class="modal-base">
        <div class="modal-content">
            <h3>🔐 Введите пароль</h3>
            <input type="password" id="passwordInput" placeholder="Пароль" onkeypress="if(event.key==='Enter')confirmPassword()">
            <div class="error" id="passwordError">❌ Неверный пароль!</div>
            <div class="btn-group">
                <button class="cancel" onclick="closePasswordModal()">Отмена</button>
                <button class="confirm" onclick="confirmPassword()">Войти</button>
            </div>
        </div>
    </div>
    
    <!-- ✏️ Модальное окно редактирования (единый стиль, без поля "Маршрут") -->
    <div id="modal" class="modal-base">
        <div class="modal-content">
            <h3 id="title">🚛 Место</h3>
            <input id="car" placeholder="Марка грузовика">
            <input id="num" placeholder="Гос. номер">
            <input id="color" placeholder="Цвет">
            <input id="owner" placeholder="Владелец/компания">
            <input id="cost" placeholder="Стоимость">
            <div class="btn-group">
                <button class="clear" onclick="clearCar()">🗑️</button>
                <button class="close" onclick="closeM()">✕</button>
                <button class="save" onclick="save()">💾</button>
            </div>
        </div>
    </div>

    <!-- 🔥 FIREBASE (ЕДИНАЯ БАЗА ДЛЯ ВСЕХ ГАРАЖЕЙ) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // 🔥 ЕДИНЫЙ FIREBASE CONFIG (как в первом файле)
        const firebaseConfig = {
            apiKey: "AIzaSyC_9eS6hShP3Nujbf_AszF68OauqcAsH6I",
            authDomain: "garage-parking-ff729.firebaseapp.com",
            databaseURL: "https://garage-parking-ff729-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "garage-parking-ff729",
            storageBucket: "garage-parking-ff729.firebasestorage.app",
            messagingSenderId: "338709707407",
            appId: "1:338709707407:web:212c6dbb979ecc931e0efa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusEl = document.getElementById('status');
        
        const EDIT_PASSWORD = 'ip-donskaya_2026';
        const GARAGE_ID = 'tk'; // 🔑 Уникальный ключ для ТК
        let isEditMode = false;
        let localDB = {};
        let active = null;
        let tooltip = document.getElementById('tooltip');
        let tooltipTimer;
        let currentSearchTerm = '';

        db.ref('.info/connected').on('value', (snapshot) => {
            if(snapshot.val() === true){
                statusEl.className = 'status connected';
                statusEl.innerText = '✅ Онлайн';
            } else {
                statusEl.className = 'status disconnected';
                statusEl.innerText = '❌ Офлайн';
            }
        });

        // 🔥 Читаем данные из "папки" ТК в общей базе
        db.ref(`garages/${GARAGE_ID}/spots`).on('value', (snapshot) => {
            localDB = snapshot.val() || {};
            build();
            if(currentSearchTerm) handleSearch();
        });

        function toggleEditMode(){
            if(isEditMode){
                isEditMode = false;
                updateEditModeBtn();
            } else {
                document.getElementById('passwordModal').style.display = 'flex';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordError').style.display = 'none';
                document.getElementById('passwordInput').focus();
            }
        }

        function updateEditModeBtn(){
            const btn = document.getElementById('editModeBtn');
            if(isEditMode){
                btn.className = 'edit-mode-btn active';
                btn.innerHTML = '✅ Режим редактирования';
            } else {
                btn.className = 'edit-mode-btn';
                btn.innerHTML = '✏️ Редактирование';
            }
        }

        function closePasswordModal(){ document.getElementById('passwordModal').style.display = 'none'; }

        function confirmPassword(){
            const password = document.getElementById('passwordInput').value;
            if(password === EDIT_PASSWORD){
                isEditMode = true;
                updateEditModeBtn();
                closePasswordModal();
            } else {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        const colorMap = {
            'белый': '#ffffff', 'бел': '#ffffff', 'white': '#ffffff',
            'чёрный': '#1a1a1a', 'черный': '#1a1a1a', 'black': '#1a1a1a',
            'красный': '#dc2626', 'крас': '#dc2626', 'red': '#dc2626',
            'синий': '#2563eb', 'син': '#2563eb', 'blue': '#2563eb',
            'серый': '#6b7280', 'сер': '#6b7280', 'gray': '#6b7280',
            'зелёный': '#16a34a', 'зеленый': '#16a34a', 'green': '#16a34a',
            'жёлтый': '#f59e0b', 'желтый': '#f59e0b', 'yellow': '#f59e0b',
            'оранжевый': '#ea580c', 'оранж': '#ea580c', 'orange': '#ea580c',
            'коричневый': '#92400e', 'кор': '#92400e', 'brown': '#92400e',
            'голубой': '#0ea5e9', 'голуб': '#0ea5e9', 'lightblue': '#0ea5e9',
            'металлик': '#94a3b8', 'мет': '#94a3b8', 'silver': '#c0c0c0',
        };

        function getColorHex(colorName){
            if(!colorName) return {hex: '#6b7280', auto: false};
            const lower = colorName.toLowerCase().trim();
            if(colorMap[lower]) return {hex: colorMap[lower], auto: false};
            for(const [key, hex] of Object.entries(colorMap)){
                if(lower.includes(key) || key.includes(lower)) return {hex, auto: true};
            }
            if(/^#[0-9a-f]{6}$/i.test(lower)) return {hex: lower, auto: false};
            return {hex: '#6b7280', auto: false};
        }

        function mkSpot(spotId){
            const d = localDB[spotId] || {};
            const el = document.createElement('div');
            el.className = 'spot' + (d.car ? ' occupied' : ' empty');
            
            if(d.car){
                el.innerHTML = `
                    <span class="num">${spotId}</span>
                    <div class="car-info">
                        <div class="car-mark">${d.car}</div>
                        <div class="car-num">${d.num||''}</div>
                    </div>
                `;
                el.addEventListener('mouseenter', (e) => {
                    clearTimeout(tooltipTimer);
                    tooltipTimer = setTimeout(() => showTooltip(e.currentTarget, d, spotId), 200);
                });
                el.addEventListener('mouseleave', () => {
                    clearTimeout(tooltipTimer);
                    tooltipTimer = setTimeout(hideTooltip, 100);
                });
                el.addEventListener('mousemove', (e) => {
                    if(tooltip.style.display === 'flex') positionTooltip(e.currentTarget);
                });
            } else {
                el.innerHTML = `<span class="num">${spotId}</span><div class="empty-icon">🅿️</div>`;
            }
            el.onclick = () => { if(isEditMode) openM(spotId); };
            el.dataset.spotId = spotId;
            return el;
        }

        function showTooltip(el, data, spotId){
            const {car, num, color, owner, cost} = data; // 🔥 Нет route для ТК
            const {hex: colorHex, auto} = getColorHex(color);
            
            let extraInfoHtml = '';
            if(color) {
                const colorLabel = auto ? `${color} ✨` : color;
                extraInfoHtml += `<div class="row"><span class="label">Цвет:</span><span class="value">${colorLabel}</span></div>`;
            }
            if(owner) extraInfoHtml += `<div class="row"><span class="label">Владелец:</span><span class="value">${owner}</span></div>`;
            if(cost) extraInfoHtml += `<div class="row"><span class="label">Стоимость:</span><span class="value">${cost} ₽</span></div>`;
            
            const badgeClass = auto ? 'color-badge auto-detected' : 'color-badge';
            
            tooltip.innerHTML = `
                <div class="header">
                    <div class="${badgeClass}" style="background:${colorHex}" title="${auto ? 'Цвет определён автоматически' : ''}"></div>
                    <div class="mark">${car||'—'}</div>
                </div>
                <div class="num">${num||'—'}</div>
                ${extraInfoHtml ? `<div class="divider"></div><div class="extra-info">${extraInfoHtml}</div>` : ''}
                <div class="spot-id">Место №${spotId} • ТК</div>
            `;
            tooltip.style.display = 'flex';
            positionTooltip(el);
        }

        function hideTooltip(){ tooltip.style.display = 'none'; }

        function positionTooltip(el){
            const rect = el.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            let top = rect.top - tooltipRect.height - 12;
            let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
            if(top < 10) top = rect.bottom + 12;
            if(left < 10) left = 10;
            if(left + tooltipRect.width > window.innerWidth - 10) left = window.innerWidth - tooltipRect.width - 10;
            tooltip.style.top = top + 'px';
            tooltip.style.left = left + 'px';
        }

        function createWindowBlock(baseId, position){
            const block = document.createElement('div');
            block.className = 'window-block';
            const window = document.createElement('div');
            window.className = 'window';
            for(let i=0; i<3; i++){
                const part = document.createElement('div');
                part.className = 'window-part';
                window.appendChild(part);
            }
            const triple = document.createElement('div');
            triple.className = 'triple-spot';
            for(let i=0; i<3; i++){
                const spotId = baseId + i; 
                triple.appendChild(mkSpot(spotId));
            }
            if(position === 'top'){
                block.appendChild(window);
                block.appendChild(triple);
            } else {
                block.appendChild(triple);
                block.appendChild(window);
            }
            return block;
        }

        function createWindowRow(position, startId){
            const row = document.createElement('div');
            row.className = position === 'top' ? 'row-top' : 'row-bottom';
            for(let i=0; i<5; i++){
                const blockStartId = startId + (i * 3);
                row.appendChild(createWindowBlock(blockStartId, position));
            }
            return row;
        }

        function openM(spotId){
            if(!isEditMode) return;
            active = spotId;
            document.getElementById('title').innerText = `🚛 Место №${spotId}`;
            const d = localDB[spotId] || {};
            document.getElementById('car').value = d.car || '';
            document.getElementById('num').value = d.num || '';
            document.getElementById('color').value = d.color || '';
            document.getElementById('owner').value = d.owner || '';
            document.getElementById('cost').value = d.cost || '';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('car').focus();
        }
        function closeM(){ document.getElementById('modal').style.display = 'none'; active = null; }

        // 🔥 Сохраняем в "папку" ТК в общей базе (без поля route)
        function save(){
            if(!active || !isEditMode) return;
            const car = document.getElementById('car').value.trim();
            const num = document.getElementById('num').value.trim();
            const color = document.getElementById('color').value.trim();
            const owner = document.getElementById('owner').value.trim();
            const cost = document.getElementById('cost').value.trim();
            
            const spotRef = db.ref(`garages/${GARAGE_ID}/spots/` + active);
            
            if(car){
                spotRef.set({car, num, color, owner, cost})
                    .then(() => { console.log('✅ ТК сохранено:', active); closeM(); })
                    .catch((error) => { console.error('❌ Ошибка:', error); alert('Ошибка сохранения!'); });
            } else {
                spotRef.remove().then(() => { console.log('🗑️ ТК очищено:', active); closeM(); });
            }
        }

        function clearCar(){
            if(!active || !isEditMode) return;
            ['car','num','color','owner','cost'].forEach(f => document.getElementById(f).value = '');
            db.ref(`garages/${GARAGE_ID}/spots/` + active).remove();
            closeM();
        }

        document.getElementById('modal').onclick = function(e){ if(e.target === this) closeM(); };

        // 🔍 Поиск (без поля route)
        function handleSearch(){
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            currentSearchTerm = searchTerm;
            document.querySelectorAll('.spot.occupied').forEach(spot => spot.classList.remove('spot-found'));
            if(!searchTerm){ hideTooltip(); return; }
            let foundSpots = [];
            document.querySelectorAll('.spot.occupied').forEach(spot => {
                const sid = spot.dataset.spotId;
                const data = localDB[sid];
                if(!data) return;
                const fields = [data.car, data.num, data.color, data.owner, data.cost].filter(f => f);
                if(fields.some(f => f.toLowerCase().includes(searchTerm))){
                    foundSpots.push(spot);
                    spot.classList.add('spot-found');
                }
            });
            if(foundSpots.length > 0){
                const first = foundSpots[0];
                first.scrollIntoView({behavior:'smooth', block:'center'});
                showTooltip(first, localDB[first.dataset.spotId], first.dataset.spotId);
            } else { hideTooltip(); }
        }

        function build(){
            const g = document.getElementById('g');
            g.innerHTML = '';
            g.appendChild(createWindowRow('top', 1));
            g.appendChild(createWindowRow('bottom', 16));
        }

        build();
        updateEditModeBtn();
        
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.spot') && !e.target.closest('.tooltip') && !e.target.closest('#searchInput')){
                hideTooltip();
            }
        });
        document.getElementById('searchInput').addEventListener('input', (e) => {
            if(e.target.value === ''){
                document.querySelectorAll('.spot.occupied').forEach(spot => spot.classList.remove('spot-found'));
            }
        });
    </script>
</body>
</html>
