<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚌 ЧАТП — ИП "Донская"</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            background:linear-gradient(135deg, #d8b4e2 0%, #c084fc 50%, #a855f7 100%);
            color:#333;
            font-family:'Segoe UI',Arial,sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow:hidden;
        }
        .garage{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            background:linear-gradient(180deg, #2d1b4e 0%, #1a0f2e 100%);
            border:2px solid #7c3aed;
            padding:20px;
            border-radius:16px;
            box-shadow:0 15px 50px rgba(124,58,237,0.4);
            max-width:98vw;
            max-height:98vh;
            overflow:auto;
        }
        
        /* === ЛЕВАЯ ПАНЕЛЬ С ВЪЕЗДАМИ === */
        .left-panel{
            display:flex;
            flex-direction:column;
            justify-content: space-between;
            height: 100%;
            gap:15px;
            padding:15px;
            background:linear-gradient(180deg, #4c1d95 0%, #2e1065 100%);
            border-radius:12px;
            border:2px solid #7c3aed;
            margin-right:20px;
            flex-shrink:0;
        }
        .gate{
            width:70px;
            height:100px;
            background:linear-gradient(180deg, #6d28d9 0%, #5b21b6 100%);
            border:3px solid #8b5cf6;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            cursor:default;
            box-shadow:0 4px 15px rgba(139,92,246,0.3);
        }
        .gate .arrow{
            color:#ddd6fe;
            font-size:32px;
            font-weight:bold;
        }
        
        /* === ОСНОВНАЯ ЗОНА ПАРКОВКИ === */
        .parking-area{
            display:flex;
            flex-direction:column;
            justify-content: space-between;
            gap: 0;
            flex:1;
            min-width:0;
            height: 100%;
        }
        
        /* === ВЕРХНИЙ И НИЖНИЙ РЯДЫ === */
        .row-top{
            display:flex;
            align-items:flex-start;
            justify-content:center;
            gap:25px;
            width:100%;
            margin-bottom:10px;
        }
        .row-bottom{
            display:flex;
            align-items:flex-end;
            justify-content:center;
            gap:25px;
            width:100%;
            margin-top:10px;
        }

        .empty-row {
            flex-grow: 1;
            width: 100%;
            min-height: 40px;
        }
        
        /* Оконный блок — 3 части */
        .window-block{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
        }
        .window{
            display:flex;
            gap:4px;
        }
        .window-part{
            width:60px;
            height:45px;
            background:linear-gradient(180deg, #a78bfa 0%, #8b5cf6 50%, #7c3aed 100%);
            border:2px solid #c4b5fd;
            border-radius:6px;
            position:relative;
            box-shadow:0 2px 8px rgba(139,92,246,0.3);
        }
        .window-part::before{
            content:'';
            position:absolute;
            top:6px;
            left:6px;
            right:6px;
            bottom:6px;
            background:rgba(255,255,255,0.3);
            border-radius:4px;
        }
        
        /* Тройное парковочное место */
        .triple-spot{
            display:flex;
            gap:4px;
            padding:6px;
            background:linear-gradient(180deg, #4c1d95 0%, #2e1065 100%);
            border-radius:10px;
            border:2px solid #7c3aed;
            box-shadow:0 4px 15px rgba(124,58,237,0.2);
        }
        .triple-spot .spot{
            width:65px;
            height:90px;
            border:2px solid #8b5cf6;
            padding:5px 3px;
            font-size:8px;
            display:flex;
            flex-direction:column;
            cursor:pointer;
            transition:all 0.3s ease;
            text-align:center;
            background:linear-gradient(180deg, #5b21b6 0%, #4c1d95 100%);
            border-radius:8px;
            position:relative;
        }
        .triple-spot .spot:hover{
            transform:translateY(-3px) scale(1.08);
            box-shadow:0 8px 25px rgba(139,92,246,0.5);
            border-color:#a78bfa;
            z-index:100;
            background:linear-gradient(180deg, #6d28d9 0%, #5b21b6 100%);
        }
        .triple-spot .spot.empty{
            background:linear-gradient(180deg, #5b21b6 0%, #4c1d95 100%);
            border-style:dashed;
        }
        .triple-spot .spot.occupied{
            background:linear-gradient(180deg, #059669 0%, #047857 100%);
            border-color:#34d399;
            box-shadow:0 4px 12px rgba(52,211,153,0.3);
        }
        .triple-spot .spot .num{
            position:absolute;
            top:3px;
            left:50%;
            transform:translateX(-50%);
            font-size:7px;
            color:#ddd6fe;
            font-weight:bold;
            background:rgba(0,0,0,0.5);
            padding:2px 5px;
            border-radius:4px;
            white-space:nowrap;
        }
        .triple-spot .spot .car-info{
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100%;
            padding-top:18px;
            gap:2px;
        }
        .triple-spot .spot .car-mark{
            color:#fde047;
            font-size:10px;
            font-weight:700;
            word-break:break-word;
            max-width:100%;
            line-height:1.2;
            text-shadow:0 2px 4px rgba(0,0,0,0.8);
            overflow:hidden;
            text-overflow:ellipsis;
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
        }
        .triple-spot .spot .car-num{
            color:#fff;
            font-size:8px;
            font-weight:600;
            word-break:break-word;
            max-width:100%;
            line-height:1.2;
            background:rgba(0,0,0,0.6);
            padding:2px 4px;
            border-radius:4px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .triple-spot .spot .empty-icon{
            font-size:24px;
            color:#a78bfa;
            margin-top:auto;
        }
        
        /* === ВСПЛЫВАЮЩАЯ ПОДСКАЗКА === */
        .tooltip{
            display:none;
            position:fixed;
            background:linear-gradient(180deg, #2e1065 0%, #1e0b36 100%);
            border:2px solid #a78bfa;
            border-radius:12px;
            padding:20px 24px;
            min-width:320px;
            max-width:400px;
            z-index:1000;
            flex-direction:column;
            align-items:flex-start;
            box-shadow:0 20px 60px rgba(124,58,237,0.5);
            pointer-events:none;
            text-align:left;
        }
        .tooltip .header{
            display:flex;
            align-items:center;
            gap:12px;
            width:100%;
            margin-bottom:10px;
            padding-bottom:10px;
            border-bottom:2px solid rgba(167,139,250,0.3);
        }
        .tooltip .color-badge{
            width:32px;
            height:32px;
            border-radius:50%;
            border:3px solid #fff;
            box-shadow:0 3px 8px rgba(0,0,0,0.4);
            flex-shrink:0;
            position:relative;
        }
        .tooltip .color-badge.auto-detected::after{
            content:'✨';
            position:absolute;
            bottom:-5px;
            right:-5px;
            font-size:12px;
            background:#2e1065;
            border-radius:50%;
            width:18px;
            height:18px;
            display:flex;
            align-items:center;
            justify-content:center;
            border:2px solid #a78bfa;
        }
        .tooltip .mark{
            color:#c4b5fd;
            font-size:22px;
            font-weight:700;
            text-shadow:0 3px 8px rgba(0,0,0,0.6);
            word-break:break-word;
            line-height:1.2;
            flex:1;
            min-width:0;
        }
        .tooltip .route-badge{
            background:linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
            color:#1e0b36;
            padding:6px 14px;
            border-radius:16px;
            font-size:14px;
            font-weight:700;
            white-space:nowrap;
            margin-left:10px;
        }
        .tooltip .divider{width:100%;height:2px;background:linear-gradient(90deg, transparent, #a78bfa, transparent);margin:10px 0;}
        .tooltip .num{
            color:#fff;
            font-size:18px;
            font-weight:600;
            background:rgba(167,139,250,0.2);
            padding:8px 18px;
            border-radius:8px;
            letter-spacing:1px;
            text-shadow:0 2px 6px rgba(0,0,0,0.5);
            white-space:nowrap;
            width:100%;
            text-align:center;
            box-sizing:border-box;
            border:1px solid rgba(167,139,250,0.3);
        }
        .tooltip .extra-info{
            margin-top:14px;
            width:100%;
            display:flex;
            flex-direction:column;
            gap:8px;
            color:#e9d5ff;
            font-size:14px;
        }
        .tooltip .extra-info .row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            width:100%;
        }
        .tooltip .extra-info .label{
            color:#a78bfa;
            font-size:13px;
        }
        .tooltip .extra-info .value{
            color:#fff;
            font-weight:600;
            text-align:right;
            word-break:break-word;
            max-width:60%;
        }
        .tooltip .spot-id{
            color:#8b5cf6;
            font-size:11px;
            margin-top:12px;
            text-align:center;
            width:100%;
        }
        
        /* === ВЫДЕЛЕНИЕ ПРИ ПОИСКЕ === */
        .spot.spot-found{
            border:3px solid #22c55e !important;
            box-shadow:0 0 0 4px rgba(34,197,94,0.5) !important;
            animation:pulse-found 2s infinite;
        }
        @keyframes pulse-found{
            0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,0.5);}
            50%{box-shadow:0 0 0 6px rgba(34,197,94,0.7);}
        }
        
        /* === ВЕРХНИЙ БАР С КНОПКАМИ === */
        .top-bar{
            position:fixed;
            top:15px;
            left:15px;
            display:flex;
            gap:10px;
            z-index:999;
            align-items:center;
            flex-wrap:wrap;
        }
        .nav-btn, .edit-mode-btn, .search-input{
            padding:12px 18px;
            background:linear-gradient(180deg, #8b5cf6 0%, #7c3aed 100%);
            color:#fff;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:14px;
            font-weight:600;
            box-shadow:0 5px 20px rgba(139,92,246,0.4);
            transition:all 0.3s;
            display:flex;
            align-items:center;
            gap:6px;
            text-decoration:none;
            white-space:nowrap;
        }
        .nav-btn:hover, .edit-mode-btn:hover, .search-input:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 25px rgba(139,92,246,0.6);
        }
        .nav-btn.main-garage{
            background:linear-gradient(180deg, #a78bfa 0%, #8b5cf6 100%);
            box-shadow:0 5px 20px rgba(167,139,250,0.4);
        }
        .nav-btn.main-garage:hover{
            box-shadow:0 8px 25px rgba(167,139,250,0.6);
        }
        .nav-btn.tk{
            background:linear-gradient(180deg, #c084fc 0%, #a855f7 100%);
            box-shadow:0 5px 20px rgba(192,132,252,0.4);
        }
        .nav-btn.tk:hover{
            box-shadow:0 8px 25px rgba(192,132,252,0.6);
        }
        .edit-mode-btn.active{
            background:linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            box-shadow:0 5px 20px rgba(34,197,94,0.4);
            animation:pulse-green 2s infinite;
        }
        @keyframes pulse-green{
            0%,100%{box-shadow:0 5px 20px rgba(34,197,94,0.4);}
            50%{box-shadow:0 5px 30px rgba(34,197,94,0.6);}
        }
        .search-input{
            background:#2e1065;
            color:#e9d5ff;
            border:2px solid #7c3aed;
            padding:12px 16px;
            width:200px;
            font-size:14px;
            font-weight:normal;
        }
        .search-input::placeholder{color:#a78bfa;}
        .search-input:focus{
            outline:none;
            border-color:#a78bfa;
            box-shadow:0 0 15px rgba(167,139,250,0.4);
            transform:translateY(0);
        }
        
        /* === МОДАЛКА РЕДАКТИРОВАНИЯ === */
        #modal{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(30,11,54,.95);
            align-items:center;
            justify-content:center;
            z-index:1000;
            backdrop-filter:blur(10px);
        }
        .modal-box{
            background:linear-gradient(180deg, #2e1065 0%, #1e0b36 100%);
            padding:28px;
            border-radius:16px;
            width:420px;
            max-width:90vw;
            border:2px solid #8b5cf6;
            box-shadow:0 20px 60px rgba(124,58,237,0.5);
        }
        .modal-box h3{
            margin-bottom:18px;
            color:#c4b5fd;
            text-align:center;
            font-size:20px;
            font-weight:600;
        }
        .modal-box input{
            width:100%;
            margin:10px 0;
            padding:14px 16px;
            background:#1e0b36;
            border:2px solid #7c3aed;
            color:#e9d5ff;
            border-radius:8px;
            font-size:15px;
        }
        .modal-box input:focus{
            outline:none;
            border-color:#a78bfa;
            box-shadow:0 0 12px rgba(167,139,250,0.3);
        }
        .modal-box .btn-group{
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            margin-top:18px;
            gap:8px;
        }
        .modal-box button{
            padding:12px 8px;
            background:#4c1d95;
            color:#e9d5ff;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:13px;
            transition:all 0.3s;
            font-weight:600;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .modal-box button:hover{transform:translateY(-2px);}
        .modal-box button.clear{background:linear-gradient(180deg, #dc2626 0%, #b91c1c 100%);}
        .modal-box button.clear:hover{background:linear-gradient(180deg, #ef4444 0%, #dc2626 100%);}
        .modal-box button.save{background:linear-gradient(180deg, #22c55e 0%, #16a34a 100%);}
        .modal-box button.save:hover{background:linear-gradient(180deg, #4ade80 0%, #22c55e 100%);}
        .modal-box button.close{background:#4c1d95;}
        .modal-box button.close:hover{background:#5b21b6;}
        
        /* === МОДАЛКА ПАРОЛЯ === */
        #passwordModal{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(30,11,54,.95);
            align-items:center;
            justify-content:center;
            z-index:1001;
            backdrop-filter:blur(10px);
        }
        .password-box{
            background:linear-gradient(180deg, #2e1065 0%, #1e0b36 100%);
            padding:28px;
            border-radius:16px;
            width:360px;
            max-width:90vw;
            border:2px solid #8b5cf6;
            box-shadow:0 20px 60px rgba(124,58,237,0.5);
        }
        .password-box h3{
            margin-bottom:20px;
            color:#c4b5fd;
            text-align:center;
            font-size:20px;
            font-weight:600;
        }
        .password-box input{
            width:100%;
            margin:12px 0;
            padding:14px 16px;
            background:#1e0b36;
            border:2px solid #7c3aed;
            color:#e9d5ff;
            border-radius:8px;
            font-size:16px;
        }
        .password-box input:focus{
            outline:none;
            border-color:#a78bfa;
            box-shadow:0 0 12px rgba(167,139,250,0.4);
        }
        .password-box .error{
            color:#f87171;
            font-size:14px;
            margin:10px 0;
            text-align:center;
            display:none;
        }
        .password-box .btn-group{
            display:flex;
            gap:10px;
            margin-top:20px;
        }
        .password-box button{
            flex:1;
            padding:14px;
            background:#4c1d95;
            color:#e9d5ff;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
            transition:all 0.3s;
            font-weight:600;
        }
        .password-box button:hover{transform:translateY(-2px);}
        .password-box button.confirm{background:linear-gradient(180deg, #8b5cf6 0%, #7c3aed 100%);}
        .password-box button.confirm:hover{background:linear-gradient(180deg, #a78bfa 0%, #8b5cf6 100%);}
        .password-box button.cancel{background:#4c1d95;}
        .password-box button.cancel:hover{background:#5b21b6;}
        
        .status{
            position:fixed;
            top:15px;
            right:15px;
            padding:10px 20px;
            background:#2e1065;
            border:2px solid #7c3aed;
            border-radius:8px;
            font-size:14px;
            z-index:999;
            font-weight:600;
        }
        .status.connected{border-color:#22c55e;color:#4ade80;}
        .status.disconnected{border-color:#f87171;color:#f87171;}
    </style>
</head>
<body>
    <div class="status" id="status">🔄 Подключение...</div>
    
    <div class="top-bar">
        <a href="index.html" class="nav-btn main-garage" title="Вернуться в главное меню">🏠 Меню</a>
        <a href="tk.html" class="nav-btn tk" title="Перейти в ТК">🛒 ТК</a>
        <div style="width:2px;height:28px;background:#7c3aed;margin:0 6px;border-radius:1px;"></div>
        <button class="edit-mode-btn" id="editModeBtn" onclick="toggleEditMode()">✏️ Редактирование</button>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск..." oninput="handleSearch()">
    </div>
    
    <main>
        <div class="garage">
            <div style="display:flex;align-items:stretch; height: 100%;">
                <!-- Левая панель с 4 въездами -->
                <div class="left-panel">
                    <div class="gate"><span class="arrow">➤</span></div>
                    <div class="gate"><span class="arrow">➤</span></div>
                    <div class="gate"><span class="arrow">➤</span></div>
                    <div class="gate"><span class="arrow">➤</span></div>
                </div>
                
                <!-- Зона парковки -->
                <div class="parking-area" id="g"></div>
            </div>
        </div>
    </main>
    
    <div class="tooltip" id="tooltip"></div>
    
    <!-- Модалка пароля -->
    <div id="passwordModal">
        <div class="password-box">
            <h3>🔐 Введите пароль</h3>
            <input type="password" id="passwordInput" placeholder="Пароль" onkeypress="if(event.key==='Enter')confirmPassword()">
            <div class="error" id="passwordError">❌ Неверный пароль!</div>
            <div class="btn-group">
                <button class="cancel" onclick="closePasswordModal()">Отмена</button>
                <button class="confirm" onclick="confirmPassword()">Войти</button>
            </div>
        </div>
    </div>
    
    <!-- Модалка редактирования места -->
    <div id="modal">
        <div class="modal-box">
            <h3 id="title">🚌 Место</h3>
            <input id="car" placeholder="Марка авто">
            <input id="num" placeholder="Гос. номер">
            <input id="route" placeholder="№ маршрута">
            <input id="color" placeholder="Цвет">
            <input id="owner" placeholder="Владелец">
            <input id="cost" placeholder="Стоимость">
            <div class="btn-group">
                <button class="clear" onclick="clearCar()">🗑️</button>
                <button class="close" onclick="closeM()">✕</button>
                <button class="save" onclick="save()">💾</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // 🔥 Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyC_9eS6hShP3Nujbf_AszF68OauqcAsH6I",
            authDomain: "garage-parking-ff729.firebaseapp.com",
            databaseURL: "https://garage-parking-ff729-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "garage-parking-ff729",
            storageBucket: "garage-parking-ff729.firebasestorage.app",
            messagingSenderId: "338709707407",
            appId: "1:338709707407:web:212c6dbb979ecc931e0efa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusEl = document.getElementById('status');
        
        // 🔐 Пароль и настройки
        const EDIT_PASSWORD = 'ip-donskaya_2026';
        const GARAGE_ID = 'catp';
        let isEditMode = false;
        let localDB = {};
        let id = 0;
        let active = null;
        let tooltip = document.getElementById('tooltip');
        let tooltipTimer;
        let currentSearchTerm = '';

        // Статус подключения
        db.ref('.info/connected').on('value', (snapshot) => {
            if(snapshot.val() === true){
                statusEl.className = 'status connected';
                statusEl.innerText = '✅ Онлайн';
            } else {
                statusEl.className = 'status disconnected';
                statusEl.innerText = '❌ Офлайн';
            }
        });

        // Подписка на данные ЧАТП
        db.ref(`garages/${GARAGE_ID}/spots`).on('value', (snapshot) => {
            localDB = snapshot.val() || {};
            build();
            if(currentSearchTerm) handleSearch();
        });

        // Переключение режима редактирования
        function toggleEditMode(){
            if(isEditMode){
                isEditMode = false;
                updateEditModeBtn();
            } else {
                document.getElementById('passwordModal').style.display = 'flex';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordError').style.display = 'none';
                document.getElementById('passwordInput').focus();
            }
        }

        function updateEditModeBtn(){
            const btn = document.getElementById('editModeBtn');
            if(isEditMode){
                btn.className = 'edit-mode-btn active';
                btn.innerHTML = '✅ Режим редактирования';
            } else {
                btn.className = 'edit-mode-btn';
                btn.innerHTML = '✏️ Редактирование';
            }
        }

        function closePasswordModal(){
            document.getElementById('passwordModal').style.display = 'none';
        }

        function confirmPassword(){
            const password = document.getElementById('passwordInput').value;
            if(password === EDIT_PASSWORD){
                isEditMode = true;
                updateEditModeBtn();
                closePasswordModal();
            } else {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        // 🎨 Умное определение цвета
        const colorMap = {
            'белый': '#ffffff', 'бел': '#ffffff', 'white': '#ffffff', 'wht': '#ffffff',
            'чёрный': '#1a1a1a', 'черный': '#1a1a1a', 'чёр': '#1a1a1a', 'чер': '#1a1a1a', 'black': '#1a1a1a', 'blk': '#1a1a1a',
            'красный': '#dc2626', 'крас': '#dc2626', 'red': '#dc2626', 'rd': '#dc2626',
            'синий': '#2563eb', 'син': '#2563eb', 'blue': '#2563eb', 'blu': '#2563eb',
            'серый': '#6b7280', 'сер': '#6b7280', 'gray': '#6b7280', 'grey': '#6b7280', 'gr': '#6b7280',
            'серебро': '#c0c0c0', 'серебристый': '#c0c0c0', 'silver': '#c0c0c0', 'sil': '#c0c0c0',
            'зелёный': '#16a34a', 'зеленый': '#16a34a', 'зел': '#16a34a', 'green': '#16a34a', 'grn': '#16a34a',
            'жёлтый': '#f59e0b', 'желтый': '#f59e0b', 'жёл': '#f59e0b', 'жел': '#f59e0b', 'yellow': '#f59e0b', 'yel': '#f59e0b',
            'оранжевый': '#ea580c', 'оранж': '#ea580c', 'orange': '#ea580c', 'org': '#ea580c',
            'коричневый': '#92400e', 'кор': '#92400e', 'brown': '#92400e', 'brn': '#92400e',
            'голубой': '#0ea5e9', 'голуб': '#0ea5e9', 'lightblue': '#0ea5e9', 'sky': '#0ea5e9',
            'розовый': '#ec4899', 'розов': '#ec4899', 'pink': '#ec4899', 'pnk': '#ec4899',
            'фиолетовый': '#8b5cf6', 'фиол': '#8b5cf6', 'purple': '#8b5cf6', 'prp': '#8b5cf6', 'violet': '#8b5cf6',
            'бежевый': '#d4a574', 'беж': '#d4a574', 'beige': '#d4a574', 'bge': '#d4a574',
            'золотой': '#fbbf24', 'зол': '#fbbf24', 'gold': '#fbbf24', 'gld': '#fbbf24',
            'бордовый': '#991b1b', 'бор': '#991b1b', 'burgundy': '#991b1b',
            'бирюзовый': '#0d9488', 'бир': '#0d9488', 'turquoise': '#0d9488',
            'металлик': '#94a3b8', 'мет': '#94a3b8', 'metallic': '#94a3b8',
        };

        function getColorHex(colorName){
            if(!colorName) return {hex: '#6b7280', auto: false};
            const lower = colorName.toLowerCase().trim();
            if(colorMap[lower]) return {hex: colorMap[lower], auto: false};
            for(const [key, hex] of Object.entries(colorMap)){
                if(lower.includes(key) || key.includes(lower)) return {hex, auto: true};
            }
            if(/^#[0-9a-f]{6}$/i.test(lower)) return {hex: lower, auto: false};
            return {hex: '#6b7280', auto: false};
        }

        // Создание парковочного места
        function mkSpot(spotId){
            const d = localDB[spotId] || {};
            const el = document.createElement('div');
            el.className = 'spot' + (d.car ? ' occupied' : ' empty');
            
            if(d.car){
                el.innerHTML = `
                    <span class="num">${spotId}</span>
                    <div class="car-info">
                        <div class="car-mark">${d.car}</div>
                        <div class="car-num">${d.num||''}</div>
                    </div>
                `;
                el.addEventListener('mouseenter', (e) => {
                    clearTimeout(tooltipTimer);
                    tooltipTimer = setTimeout(() => showTooltip(e.currentTarget, d, spotId), 200);
                });
                el.addEventListener('mouseleave', () => {
                    clearTimeout(tooltipTimer);
                    tooltipTimer = setTimeout(hideTooltip, 100);
                });
                el.addEventListener('mousemove', (e) => {
                    if(tooltip.style.display === 'flex') positionTooltip(e.currentTarget);
                });
            } else {
                el.innerHTML = `<span class="num">${spotId}</span><div class="empty-icon">🅿️</div>`;
            }
            
            el.onclick = () => { if(isEditMode) openM(spotId); };
            el.dataset.spotId = spotId;
            return el;
        }

        // Показать подсказку
        function showTooltip(el, data, spotId){
            const {car, num, route, color, owner, cost} = data;
            const {hex: colorHex, auto} = getColorHex(color);
            
            let extraInfoHtml = '';
            if(route) extraInfoHtml += `<div class="row"><span class="label">Маршрут:</span><span class="value">${route}</span></div>`;
            if(color) {
                const colorLabel = auto ? `${color} ✨` : color;
                extraInfoHtml += `<div class="row"><span class="label">Цвет:</span><span class="value">${colorLabel}</span></div>`;
            }
            if(owner) extraInfoHtml += `<div class="row"><span class="label">Владелец:</span><span class="value">${owner}</span></div>`;
            if(cost) extraInfoHtml += `<div class="row"><span class="label">Стоимость:</span><span class="value">${cost} ₽</span></div>`;
            
            const badgeClass = auto ? 'color-badge auto-detected' : 'color-badge';
            const routeHtml = route ? `<span class="route-badge">№${route}</span>` : '';
            
            tooltip.innerHTML = `
                <div class="header">
                    <div class="${badgeClass}" style="background:${colorHex}" title="${auto ? 'Цвет определён автоматически' : ''}"></div>
                    <div class="mark">${car||'—'}</div>
                    ${routeHtml}
                </div>
                <div class="num">${num||'—'}</div>
                ${extraInfoHtml ? `<div class="divider"></div><div class="extra-info">${extraInfoHtml}</div>` : ''}
                <div class="spot-id">Место №${spotId} • ЧАТП</div>
            `;
            tooltip.style.display = 'flex';
            positionTooltip(el);
        }

        function hideTooltip(){ tooltip.style.display = 'none'; }

        function positionTooltip(el){
            const rect = el.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            let top = rect.top - tooltipRect.height - 12;
            let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
            if(top < 10) top = rect.bottom + 12;
            if(left < 10) left = 10;
            if(left + tooltipRect.width > window.innerWidth - 10) left = window.innerWidth - tooltipRect.width - 10;
            tooltip.style.top = top + 'px';
            tooltip.style.left = left + 'px';
        }

        // Создание оконного блока с тройными местами
        function createWindowBlock(baseId, position){
            const block = document.createElement('div');
            block.className = 'window-block';
            
            // Окно (3 части)
            const window = document.createElement('div');
            window.className = 'window';
            for(let i=0; i<3; i++){
                const part = document.createElement('div');
                part.className = 'window-part';
                window.appendChild(part);
            }
            
            // Тройные места
            const triple = document.createElement('div');
            triple.className = 'triple-spot';
            for(let i=0; i<3; i++){
                const spotId = baseId + i; 
                triple.appendChild(mkSpot(spotId));
            }
            
            // Для верхнего ряда: окна сверху, места снизу
            // Для нижнего ряда: места сверху, окна снизу
            if(position === 'top'){
                block.appendChild(window);
                block.appendChild(triple);
            } else { // position === 'bottom'
                block.appendChild(triple);
                block.appendChild(window);
            }
            
            return block;
        }

        // Создание ряда с 5 оконными блоками
        function createWindowRow(position, startBaseId){
            const row = document.createElement('div');
            row.className = position === 'top' ? 'row-top' : 'row-bottom';
            
            for(let i=0; i<5; i++){
                const blockBaseId = startBaseId + (i * 10);
                row.appendChild(createWindowBlock(blockBaseId, position));
            }
            return row;
        }

        // Открытие модалки редактирования
        function openM(spotId){
            if(!isEditMode) return;
            active = spotId;
            document.getElementById('title').innerText = `🚌 Место №${spotId}`;
            const d = localDB[spotId] || {};
            document.getElementById('car').value = d.car || '';
            document.getElementById('num').value = d.num || '';
            document.getElementById('route').value = d.route || '';
            document.getElementById('color').value = d.color || '';
            document.getElementById('owner').value = d.owner || '';
            document.getElementById('cost').value = d.cost || '';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('car').focus();
        }
        function closeM(){ document.getElementById('modal').style.display = 'none'; active = null; }

        // Сохранение в Firebase с проверкой
        function save(){
            if(!active || !isEditMode) return;
            const car = document.getElementById('car').value.trim();
            const num = document.getElementById('num').value.trim();
            const route = document.getElementById('route').value.trim();
            const color = document.getElementById('color').value.trim();
            const owner = document.getElementById('owner').value.trim();
            const cost = document.getElementById('cost').value.trim();
            
            const spotRef = db.ref(`garages/${GARAGE_ID}/spots/` + active);
            
            if(car){
                spotRef.set({car, num, route, color, owner, cost})
                    .then(() => {
                        console.log('Данные сохранены:', {car, num, route, color, owner, cost});
                        closeM();
                    })
                    .catch((error) => {
                        console.error('Ошибка сохранения:', error);
                        alert('Ошибка сохранения данных!');
                    });
            } else {
                spotRef.remove()
                    .then(() => {
                        console.log('Место очищено');
                        closeM();
                    })
                    .catch((error) => {
                        console.error('Ошибка удаления:', error);
                        alert('Ошибка удаления данных!');
                    });
            }
        }

        function clearCar(){
            if(!active || !isEditMode) return;
            ['car','num','route','color','owner','cost'].forEach(f => document.getElementById(f).value = '');
            db.ref(`garages/${GARAGE_ID}/spots/` + active).remove();
            closeM();
        }

        document.getElementById('modal').onclick = function(e){ if(e.target === this) closeM(); };

        // Поиск
        function handleSearch(){
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            currentSearchTerm = searchTerm;
            document.querySelectorAll('.spot.occupied').forEach(spot => spot.classList.remove('spot-found'));
            if(!searchTerm){ hideTooltip(); return; }
            
            let foundSpots = [];
            document.querySelectorAll('.spot.occupied').forEach(spot => {
                const sid = spot.dataset.spotId;
                const data = localDB[sid];
                if(!data) return;
                const fields = [data.car, data.num, data.route, data.color, data.owner, data.cost].filter(f => f);
                if(fields.some(f => f.toLowerCase().includes(searchTerm))){
                    foundSpots.push(spot);
                    spot.classList.add('spot-found');
                }
            });
            
            if(foundSpots.length > 0){
                const first = foundSpots[0];
                first.scrollIntoView({behavior:'smooth', block:'center'});
                showTooltip(first, localDB[first.dataset.spotId], first.dataset.spotId);
            } else { hideTooltip(); }
        }

        // Построение схемы
        function build(){
            id = 0;
            const g = document.getElementById('g');
            g.innerHTML = ''; // Очищаем существующее содержимое
            
            // 1. Верхний ряд парковки (напротив 1-го въезда)
            g.appendChild(createWindowRow('top', 0)); // baseId 0 для верхнего ряда (ID 0-49)

            // 2. Пустая строка (растягивается напротив 2-го въезда)
            const emptyRow2 = document.createElement('div');
            emptyRow2.className = 'empty-row';
            g.appendChild(emptyRow2);

            // 3. Пустая строка (растягивается напротив 3-го въезда)
            const emptyRow3 = document.createElement('div');
            emptyRow3.className = 'empty-row';
            g.appendChild(emptyRow3);

            // 4. Нижний ряд парковки (напротив 4-го въезда)
            g.appendChild(createWindowRow('bottom', 50)); // baseId 50 для нижнего ряда (ID 50-99)
        }

        build();
        updateEditModeBtn();
        
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.spot') && !e.target.closest('.tooltip') && !e.target.closest('#searchInput')){
                hideTooltip();
            }
        });
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            if(e.target.value === ''){
                document.querySelectorAll('.spot.occupied').forEach(spot => spot.classList.remove('spot-found'));
            }
        });
    </script>
</body>
</html>
