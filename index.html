<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Donskaya</title>
    <style>
        /* Center and left-align bottom parking row */
        .bottom-parking-row {
            display: flex;
            justify-content: flex-start; /* Align left */
            margin: 0 auto; /* Center the row */
        }

        /* Fix arrows direction */
        .arrow {
            display: inline-block;
        }
        .top-arrow {
            transform: rotate(0deg); /* Pointing right */
        }
        .bottom-arrow {
            transform: rotate(180deg); /* Pointing left */
        }

        /* Expand modal buttons */
        .modal-button {
            width: 100%; /* Full width */
            padding: 10px;
            text-align: center;
        }

        /* Improve tooltip positioning */
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 1000;
            white-space: nowrap;
        }
        /* Specific tooltip for car information */
        .car-tooltip {
            /* CSS to set tooltip near cursor */
            transform: translate(-50%, -100%);
        }
    </style>
</head>
<body>
    <div class="garage">
        <div class="bottom-parking-row">
            <!-- Parking spaces -->
        </div>
        <div class="arrows">
            <span class="arrow top-arrow">&rarr;</span> <!-- Right arrow -->
            <span class="arrow bottom-arrow">&larr;</span> <!-- Left arrow -->
        </div>
        <div class="modal">
            <button class="modal-button">Open Modal</button>
        </div>
        <div class="tooltip car-tooltip">Car Information</div>
    </div>
</body>
</html>
