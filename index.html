<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Parking Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .parking-slot {
            width: 100px;
            height: 100px;
            margin: 10px;
            background-color: #4CAF50;
            display: inline-block;
            text-align: center;
            line-height: 100px;
            color: white;
            font-size: 20px;
        }
        .occupied {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <h1>Parking Slots</h1>
    <div id="parking-container">
        <div class="parking-slot">1</div>
        <div class="parking-slot occupied">2</div>
        <div class="parking-slot">3</div>
        <div class="parking-slot">4</div>
        <div class="parking-slot">5</div>
        <div class="parking-slot">6</div>
        <div class="parking-slot">7</div>
        <div class="parking-slot">8</div>
        <div class="parking-slot">9</div>
        <div class="parking-slot">10</div>
    </div>
</body>
</html>
