<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Garage Donskaya</title>
    <script>
        // Automatically save data every 5 seconds
        setInterval(() => {
            // Code to save data
            console.log('Data saved!');
        }, 5000);
    </script>
</head>
<body>
    <header>
        <h1 aria-label="Garage Donskaya - Welcome">Welcome to Garage Donskaya</h1>
    </header>
    <main>
        <form aria-label="User Input Form">
            <label for="userInput">Input:</label>
            <input type="text" id="userInput" required aria-label="User input field">
            <button type="submit">Submit</button>
        </form>
        <div id="error-message" role="alert"></div>
    </main>
    <script>
        // Improve error handling
        const form = document.querySelector('form');
        const errorMessage = document.getElementById('error-message');
        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const input = document.getElementById('userInput').value;
            if (input.trim() === '') {
                errorMessage.textContent = 'Input cannot be empty!';
                return;
            }
            errorMessage.textContent = '';
            console.log('Form submitted:', input);
            // You can add additional validation logic here.
        });
    </script>
</body>
</html>
